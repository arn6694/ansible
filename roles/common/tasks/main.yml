---
- name: Assert supported OS family
  ansible.builtin.assert:
    that: ansible_os_family in ['Debian', 'RedHat', 'Suse', 'Archlinux']
    fail_msg: "Unsupported OS family: {{ ansible_os_family }}"
  tags: [always]

# EPEL carries htop on RHEL/Rocky/Alma. Fedora already has it, and enabling
# EPEL there would be wrong.
- name: Enable EPEL (RHEL-likes, not Fedora)
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when:
    - ansible_os_family == 'RedHat'
    - ansible_distribution != 'Fedora'
    - common_enable_epel | bool
  tags: [packages]

- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'
  tags: [packages]

# pacman never auto-syncs. Without -Sy first, `package:` installs fail on any
# Arch box whose db is stale. Command (not the pacman module) so this works
# even before the full `ansible` package (with community.general) is present.
- name: Refresh pacman cache
  ansible.builtin.command: pacman -Sy --noconfirm
  changed_when: false
  when: ansible_os_family == 'Archlinux'
  tags: [packages]

- name: Install base packages
  ansible.builtin.package:
    name: "{{ common_packages }}"
    state: present
  tags: [packages]

# curl: safe on Debian/Fedora. On RHEL/Rocky, curl-minimal already provides the
# binary and the full 'curl' package conflicts with it — so only install where
# the binary is genuinely absent.
# plocate replaced mlocate on Debian 12+, Arch, and Fedora — but NOT on
# RHEL/Rocky 9 (not even via EPEL) or SUSE, which still ship mlocate.
# Verified empirically: EPEL9 has no plocate package.
- name: Install locate (plocate or mlocate, distro-dependent)
  ansible.builtin.package:
    name: "{{ 'plocate' if (ansible_os_family in ['Debian', 'Archlinux'] or ansible_distribution == 'Fedora') else 'mlocate' }}"
    state: present
  when: common_install_locate | bool
  tags: [packages]

- name: Check for curl binary
  ansible.builtin.stat:
    path: /usr/bin/curl
  register: curl_bin
  tags: [packages]

- name: Install curl (only where absent)
  ansible.builtin.package:
    name: curl
    state: present
  when: common_install_curl | bool and not curl_bin.stat.exists
  tags: [packages]

- name: Global shell config (aliases, history timestamps)
  ansible.builtin.template:
    src: custom_system_wide.sh.j2
    dest: /etc/profile.d/custom_system_wide.sh
    mode: '0644'
    owner: root
    group: root
  tags: [shell]

# Debian/Arch source /etc/profile.d only for LOGIN shells, so GUI terminals
# would miss the aliases there; RHEL's /etc/bashrc sources it for every
# interactive shell. Sourcing it from this block covers both worlds (double
# sourcing on login shells is harmless — aliases/exports just re-set).
- name: Set global prompt and hook aliases into interactive shells
  ansible.builtin.blockinfile:
    path: "{{ '/etc/bash.bashrc' if ansible_os_family in ['Debian', 'Archlinux'] else '/etc/bashrc' }}"
    marker: "# {mark} ANSIBLE MANAGED PROMPT"
    create: true
    mode: '0644'
    block: |
      [ -f /etc/profile.d/custom_system_wide.sh ] && . /etc/profile.d/custom_system_wide.sh
      {{ common_prompt }}
  tags: [shell]
