---
# Packages common to every distro. Family-specific extras and renames are
# resolved in tasks/main.yml.
common_packages:
  - git
  - htop
  - rsync
  - tmux
  - unzip
  - vim
  - wget
  - bash-completion
  - ca-certificates

# RHEL/Rocky ship curl-minimal, which provides /usr/bin/curl but CONFLICTS with
# the 'curl' package. Fedora does not have this problem. Handled in tasks.
common_install_curl: true

# htop is not in RHEL/Rocky base repos — it needs EPEL.
common_enable_epel: true

common_prompt: "export PS1='\\[\\033[01;32m\\]\\u@\\[\\033[01;31m\\]\\h\\[\\033[00m\\]:\\[\\033[01;34m\\]\\w\\[\\033[00m\\]\\$ '"
