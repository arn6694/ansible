[defaults]
roles_path           = roles
retry_files_enabled  = False
interpreter_python   = /usr/bin/python3

# NOT `stdout_callback = yaml` — that callback lives in a collection, and
# ansible-core (what RHEL/Rocky package and every pull host runs) ships no
# collections, so it aborts with "Invalid callback for stdout specified".
# result_format is the builtin equivalent and gives the same readable output.
result_format        = yaml

[privilege_escalation]
become = False
